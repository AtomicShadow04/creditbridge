services:
  - type: web
    name: creditbridge-backend
    runtime: node
    startCommand: npm run start:prod
    buildCommand: npm install && npm run build
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
